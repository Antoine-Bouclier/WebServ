server {
    listen 8080;
    server_name localhost;

    root /var/www/html;
    index index.html index.htm;

    client_max_body_size 10M;

    error_page 404 /404.html;

    location / {
        allowed_methods GET POST;
        autoindex off;
    }

    location /images {
        root /var/www/assets;
        allowed_methods GET;
        autoindex on;
    }

    location /upload {
        allowed_methods POST;
        upload_path /var/www/uploads;
    }

    location /cgi-bin {
        allowed_methods GET POST;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}
